<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TK Handelsonderneming — Tire Store</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0A0A0B; --surface: #111214; --border: #1F2937; --border2: #374151;
  --text: #E5E7EB; --text2: #C9CDD5; --text3: #9CA3AF; --text4: #6B7280;
  --amber: #F59E0B; --amber-dark: #D97706; --green: #10B981; --green-dark: #064E3B;
  --blue: #3B82F6; --purple: #8B5CF6; --red: #EF4444; --red-dark: #7F1D1D;
}
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
input, select, textarea {
  background: var(--border); border: 1px solid var(--border2); color: var(--text);
  border-radius: 8px; padding: 10px 14px; font-size: 14px; outline: none; font-family: inherit; box-sizing: border-box;
}
input:focus, select:focus, textarea:focus { border-color: var(--amber); box-shadow: 0 0 0 2px rgba(245,158,11,.2); }
input::placeholder, textarea::placeholder { color: var(--text3); }
textarea { min-height: 60px; resize: vertical; }

.btn-primary {
  background: var(--amber); color: var(--bg); border: none; border-radius: 8px;
  padding: 10px 20px; font-weight: 700; font-size: 14px; cursor: pointer; font-family: inherit;
  transition: all .15s; display: inline-flex; align-items: center; gap: 8px; justify-content: center;
}
.btn-primary:hover { background: var(--amber-dark); }
.btn-primary:disabled { opacity: .4; cursor: not-allowed; }
.btn-ghost {
  background: transparent; border: 1px solid var(--border2); color: var(--text2);
  border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer; font-family: inherit; transition: all .15s;
}
.btn-ghost:hover { border-color: var(--text3); color: var(--text); }
.btn-danger {
  background: transparent; border: 1px solid var(--red-dark); color: var(--red);
  border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; font-family: inherit; transition: all .15s;
}
.btn-danger:hover { background: rgba(239,68,68,.1); }

/* Header */
.header { border-bottom: 1px solid var(--border); padding: 14px 20px; position: sticky; top: 0; z-index: 50; background: var(--bg); }
.header-inner { display: flex; align-items: center; justify-content: space-between; max-width: 1200px; margin: 0 auto; }
.logo { display: flex; align-items: center; gap: 12px; }
.logo-img { height: 48px; width: auto; object-fit: contain; }
.logo-icon { width: 36px; height: 36px; border-radius: 8px; background: linear-gradient(135deg, var(--amber), var(--amber-dark)); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; color: var(--bg); }
.logo-text { font-weight: 800; font-size: 16px; color: #F5F5F5; letter-spacing: -0.5px; }
.logo-sub { font-size: 11px; color: var(--text3); letter-spacing: 1px; }

/* Nav pills */
.pill-nav { display: flex; gap: 4px; background: var(--surface); border-radius: 10px; padding: 4px; border: 1px solid var(--border); }
.pill-btn { padding: 8px 16px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s; position: relative; background: transparent; color: var(--text2); }
.pill-btn.active { background: var(--amber); color: var(--bg); }
.pill-badge { position: absolute; top: -4px; right: -4px; background: var(--red); color: #fff; border-radius: 10px; padding: 1px 6px; font-size: 10px; font-weight: 800; }

/* Cart button */
.cart-btn {
  position: relative; background: var(--surface); border: 1px solid var(--border2);
  border-radius: 10px; padding: 8px 14px; cursor: pointer; font-family: inherit;
  display: flex; align-items: center; gap: 8px; color: var(--text); font-size: 13px;
  font-weight: 600; transition: all .15s;
}
.cart-btn:hover { border-color: var(--amber); }
.cart-btn.has-items { border-color: var(--amber); background: rgba(245,158,11,.08); color: var(--amber); }
.cart-count { background: var(--amber); color: var(--bg); border-radius: 20px; padding: 2px 8px; font-size: 11px; font-weight: 800; }

/* Main */
.main { max-width: 1200px; margin: 0 auto; padding: 20px 16px; }
.filters { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; align-items: center; }
.filters input { flex: 1 1 200px; min-width: 180px; }
.filters select { min-width: 120px; }
.count { font-size: 13px; color: var(--text3); margin-bottom: 14px; }

/* Grid */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.tire-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px; transition: all .2s; position: relative; overflow: hidden;
}
.tire-card:hover { border-color: var(--border2); }
.tire-card.sold-out { opacity: .5; }
.tire-card.in-cart { border-color: var(--amber); background: rgba(245,158,11,.04); }
.tire-card.sold-out { opacity: 1 !important; }

/* Uitverkocht overlay — rode diagonale streep */
.sold-out-overlay {
  position: absolute; inset: 0; border-radius: 12px;
  pointer-events: none; z-index: 2; overflow: hidden;
}
.sold-out-overlay::before {
  content: '';
  position: absolute;
  top: -10px; left: -10px; right: -10px; bottom: -10px;
  background: repeating-linear-gradient(
    -45deg,
    transparent,
    transparent 18px,
    rgba(239,68,68,.13) 18px,
    rgba(239,68,68,.13) 22px
  );
}
.sold-out-overlay::after {
  content: '';
  position: absolute; inset: 0;
  background: rgba(10,10,11,.55);
  border-radius: 12px;
}
.sold-out-label {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-8deg);
  z-index: 3; font-size: 13px; font-weight: 900; color: #fff; letter-spacing: 2px;
  text-transform: uppercase; background: var(--red); padding: 5px 16px;
  border-radius: 6px; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,.5);
}
.sold-out-sub {
  position: absolute; bottom: 12px; left: 0; right: 0; z-index: 3;
  text-align: center; font-size: 10px; color: rgba(255,255,255,.6);
}

/* Staffelbanner */
.staffel-banner {
  background: linear-gradient(90deg, rgba(245,158,11,.12), rgba(245,158,11,.06));
  border-bottom: 1px solid rgba(245,158,11,.2);
  padding: 10px 20px; cursor: pointer; user-select: none;
}
.staffel-banner-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
.staffel-banner-left { display: flex; align-items: center; gap: 10px; }
.staffel-banner-icon { font-size: 16px; }
.staffel-banner-text { font-size: 13px; font-weight: 700; color: var(--amber); }
.staffel-banner-sub { font-size: 11px; color: var(--text3); }
.staffel-chevron { color: var(--amber); font-size: 12px; transition: transform .2s; }
.staffel-chevron.open { transform: rotate(180deg); }

/* Staffel dropdown */
.staffel-dropdown {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 16px 20px; animation: fadeIn .15s ease;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(-4px) } to { opacity:1; transform:translateY(0) } }
.staffel-dropdown-inner { max-width: 1200px; margin: 0 auto; }
.staffel-grid { display: flex; gap: 10px; flex-wrap: wrap; }
.staffel-tier {
  flex: 1 1 160px; background: var(--border); border-radius: 10px; padding: 12px 16px;
  border: 1px solid var(--border2); transition: all .15s;
}
.staffel-tier.active { border-color: var(--amber); background: rgba(245,158,11,.08); }
.staffel-tier-range { font-size: 12px; color: var(--text3); margin-bottom: 4px; }
.staffel-tier-pct { font-size: 22px; font-weight: 800; color: var(--amber); }
.staffel-tier-label { font-size: 11px; color: var(--text2); margin-top: 2px; }
.staffel-tier.active .staffel-tier-range { color: var(--amber); }

/* Staffelprijs op kaart */
.tire-price-staffel { font-weight: 800; font-size: 20px; color: var(--green); }
.tire-price-original { font-size: 13px; color: var(--text4); text-decoration: line-through; margin-left: 4px; }
.staffel-saving { font-size: 10px; color: var(--green); font-weight: 600; margin-top: 1px; }

/* Tip banner */
.staffel-tip {
  background: rgba(16,185,129,.08); border: 1px solid rgba(16,185,129,.2);
  border-radius: 8px; padding: 8px 14px; margin-bottom: 14px;
  font-size: 12px; color: var(--green); display: flex; align-items: center; gap: 8px;
}
.staffel-tip strong { font-weight: 700; }
.tire-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.tire-brand { font-weight: 700; font-size: 15px; color: #F5F5F5; }
.tire-model { font-size: 13px; color: var(--text2); }
.tire-mid { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.tire-size { background: var(--border); padding: 4px 10px; border-radius: 6px; font-weight: 700; font-size: 14px; color: var(--amber); font-family: monospace; }
.tire-load { font-size: 11px; color: var(--text3); }
.tire-bottom { display: flex; justify-content: space-between; align-items: flex-end; }
.tire-price { font-weight: 800; font-size: 20px; color: #F5F5F5; }
.tire-price-label { font-size: 11px; color: var(--text3); margin-left: 4px; font-style: italic; }
.tire-advies { font-size: 11px; color: #E5E7EB; text-decoration: line-through; text-decoration-color: var(--red); text-decoration-thickness: 1.5px; }
.tire-stock { text-align: right; }
.tire-avail { font-size: 11px; margin-top: 3px; font-weight: 600; }
.tire-avail.yes { color: var(--green); }
.tire-avail.no { color: var(--red); }
.tire-meta { font-size: 10px; color: var(--text4); margin-top: 6px; }

/* Add to cart area on card */
.card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); }
.qty-ctrl { display: flex; align-items: center; gap: 6px; }
.qty-btn { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border2); background: var(--border); color: var(--text); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; font-family: inherit; line-height: 1; }
.qty-btn:hover:not(:disabled) { border-color: var(--amber); color: var(--amber); }
.qty-btn:disabled { opacity: .3; cursor: not-allowed; }
.qty-val { font-size: 14px; font-weight: 700; min-width: 20px; text-align: center; color: var(--text); }
.add-btn {
  background: var(--amber); color: var(--bg); border: none; border-radius: 8px;
  padding: 7px 14px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit;
  transition: all .15s; display: flex; align-items: center; gap: 5px;
}
.add-btn:hover { background: var(--amber-dark); }
.add-btn:disabled { opacity: .4; cursor: not-allowed; }
.in-cart-indicator { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--amber); font-weight: 600; }
.remove-from-cart { background: none; border: none; color: var(--text4); cursor: pointer; font-size: 14px; padding: 2px 4px; }
.remove-from-cart:hover { color: var(--red); }

/* Season badge */
.season { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; color: #fff; }
.season.zomer { background: var(--amber); }
.season.winter { background: var(--blue); }
.season.all-season { background: var(--green); }

/* Stock dots */
.dots { display: flex; gap: 3px; justify-content: flex-end; }
.dot { width: 8px; height: 8px; border-radius: 50%; }
.dot.on { background: var(--green); border: 1px solid #059669; }
.dot.off { background: var(--border2); border: 1px solid var(--text4); }

/* Status badge */
.status-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }

/* Stats */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 20px; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; text-align: center; }
.stat-val { font-size: 28px; font-weight: 800; }
.stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* Reservations list */
.res-list { display: flex; flex-direction: column; gap: 8px; }

/* Onlangs verkocht sectie */
.sold-section { margin-bottom: 28px; }
.sold-section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px; padding-bottom: 10px; border-bottom: 2px solid rgba(239,68,68,.3);
}
.sold-section-title { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 800; color: #F5F5F5; }
.sold-section-badge { background: var(--red); color: #fff; border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 800; }
.sold-toggle-btn { background: transparent; border: 1px solid rgba(239,68,68,.4); color: var(--red); border-radius: 8px; padding: 6px 14px; font-size: 12px; cursor: pointer; font-family: inherit; transition: all .15s; }
.sold-toggle-btn:hover { background: rgba(239,68,68,.1); }
.sold-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.tire-card.sold-card { border-color: rgba(239,68,68,.25); background: rgba(239,68,68,.03); }
.tire-card.sold-card:hover { border-color: rgba(239,68,68,.4); transform: none; box-shadow: none; }
.sold-banner { background: var(--red); border-radius: 6px; padding: 7px 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.sold-banner-text { font-size: 11px; font-weight: 800; color: #fff; letter-spacing: 1.5px; text-transform: uppercase; }
.sold-banner-sub { font-size: 10px; color: rgba(255,255,255,.7); margin-left: auto; }
.res-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
.res-top { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
.res-name { font-weight: 700; font-size: 14px; color: #F5F5F5; }
.res-company { font-size: 12px; color: var(--text3); margin-left: 8px; }
.res-tire { font-size: 13px; color: var(--text2); margin-bottom: 6px; }
.res-contact { font-size: 12px; color: var(--text3); margin-bottom: 8px; }
.res-meta { font-size: 11px; color: var(--text4); margin-bottom: 10px; }
.res-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.res-items { margin-bottom: 8px; }
.res-item-row { font-size: 12px; color: var(--text2); padding: 3px 0; border-bottom: 1px solid var(--border); }
.res-item-row:last-child { border-bottom: none; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; max-width: 480px; width: 92%; max-height: 90vh; overflow-y: auto; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.modal-title { font-size: 18px; font-weight: 800; color: #F5F5F5; }
.modal-close { background: none; border: none; color: var(--text3); font-size: 20px; cursor: pointer; }

/* Cart summary in modal */
.cart-summary { background: var(--border); border-radius: 10px; padding: 14px; margin-bottom: 16px; }
.cart-summary-title { font-size: 12px; color: var(--text3); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
.cart-summary-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border2); }
.cart-summary-item:last-child { border-bottom: none; padding-bottom: 0; }
.cart-item-info { flex: 1; }
.cart-item-name { font-size: 13px; font-weight: 600; color: #F5F5F5; }
.cart-item-size { font-size: 11px; color: var(--amber); font-family: monospace; }
.cart-item-qty { display: flex; align-items: center; gap: 6px; }
.cart-qty-btn { width: 24px; height: 24px; border-radius: 5px; border: 1px solid var(--border2); background: var(--bg); color: var(--text); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: inherit; }
.cart-qty-btn:hover { border-color: var(--amber); color: var(--amber); }
.cart-item-price { font-size: 12px; color: var(--text2); min-width: 70px; text-align: right; }
.cart-remove { background: none; border: none; color: var(--text4); cursor: pointer; font-size: 14px; padding: 0 0 0 8px; }
.cart-remove:hover { color: var(--red); }
.cart-total { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; margin-top: 4px; border-top: 1px solid var(--border2); }
.cart-total-label { font-size: 13px; font-weight: 700; color: var(--text2); }
.cart-total-val { font-size: 16px; font-weight: 800; color: var(--amber); }

.modal-form { display: flex; flex-direction: column; gap: 10px; }
.modal-hint { font-size: 11px; color: var(--text3); text-align: center; }
.form-section-title { font-size: 12px; color: var(--text3); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-top: 4px; }

/* Notification */
.notify { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 999; padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 600; color: #fff; box-shadow: 0 8px 32px rgba(0,0,0,.5); animation: slideDown .3s ease; max-width: 90%; }
.notify.success { background: var(--green-dark); border: 1px solid var(--green); }
.notify.error { background: var(--red-dark); border: 1px solid var(--red); }
@keyframes slideDown { from { opacity:0; transform:translateX(-50%) translateY(-20px) } to { opacity:1; transform:translateX(-50%) translateY(0) } }

/* Empty */
.empty { text-align: center; padding: 60px; color: var(--text4); }

/* Spinner */
.spinner { width: 18px; height: 18px; border: 2px solid var(--border2); border-top-color: var(--amber); border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg) } }

/* Header right */
.header-right { display: flex; align-items: center; gap: 8px; }

/* Admin top */
.admin-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
.admin-title { font-size: 20px; font-weight: 800; color: #F5F5F5; }
.admin-btns { display: flex; gap: 8px; }

/* Empty cart state */
.cart-empty { text-align: center; padding: 30px; color: var(--text4); }
.cart-empty-icon { font-size: 32px; margin-bottom: 8px; }

/* Responsive */
@media (max-width: 600px) {
  .header-inner { flex-direction: column; gap: 10px; }
  .logo-text { font-size: 14px; }
  .tire-price { font-size: 18px; }
  .header-right { flex-wrap: wrap; justify-content: center; }
}

/* Footer */
.site-footer { border-top: 1px solid var(--border); padding: 24px 20px; margin-top: 40px; text-align: center; }
.footer-inner { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 6px; }
.footer-name { font-size: 13px; font-weight: 700; color: var(--text2); letter-spacing: 0.5px; }
.footer-meta { font-size: 11px; color: var(--text4); display: flex; flex-wrap: wrap; justify-content: center; gap: 4px 16px; }
.footer-meta span { white-space: nowrap; }
.footer-legal { font-size: 10px; color: var(--text4); font-style: italic; margin-top: 4px; }

/* Factuur preview modal */
.factuur-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
.factuur-modal-box { background: #fff; border-radius: 12px; max-width: 680px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; }
.factuur-modal-actions { position: sticky; top: 0; background: #111214; padding: 12px 20px; display: flex; gap: 10px; align-items: center; border-radius: 12px 12px 0 0; z-index: 10; }
.factuur-modal-actions span { color: #9ca3af; font-size: 13px; flex: 1; }

/* ================= LANDING PAGE ================= */
.landing {
  position: fixed; inset: 0; background: radial-gradient(ellipse at center, #1a1a1f 0%, #0A0A0B 60%, #000 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 20px; overflow: hidden; z-index: 100;
}
.landing-bg {
  position: absolute; inset: 0; overflow: hidden; pointer-events: none;
}
.landing-bg::before {
  content: ''; position: absolute; top: 50%; left: 50%;
  width: 140vmin; height: 140vmin; transform: translate(-50%, -50%);
  background: radial-gradient(circle, rgba(245,158,11,.15) 0%, rgba(245,158,11,0) 60%);
  animation: glow-pulse 4s ease-in-out infinite;
}
@keyframes glow-pulse {
  0%, 100% { opacity: .6; transform: translate(-50%, -50%) scale(1); }
  50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
}
.landing-tire-svg {
  position: absolute; top: 50%; left: 50%;
  width: min(80vmin, 620px); height: min(80vmin, 620px);
  transform: translate(-50%, -50%) scale(0.2);
  opacity: 0;
  animation: tire-zoom-in 900ms cubic-bezier(.2,.8,.3,1) 400ms forwards;
  pointer-events: none;
}
@keyframes tire-zoom-in {
  0% { transform: translate(-50%, -50%) scale(0.2); opacity: 0; }
  60% { opacity: .4; }
  100% { transform: translate(-50%, -50%) scale(1); opacity: .25; }
}
.landing-content {
  position: relative; z-index: 10; text-align: center;
  max-width: 900px; width: 100%;
}
.landing-logo {
  display: inline-flex; align-items: center; gap: 14px; margin-bottom: 28px;
  opacity: 0; transform: scale(.7);
  animation: fade-scale 500ms cubic-bezier(.2,.8,.3,1) 0ms forwards;
}
.landing-logo-icon {
  width: 56px; height: 56px; border-radius: 14px;

<script>
// ========== CONFIG ==========
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbygSDECS3JKMkSabJ2fAgwt18fJ9QF9piWBYDvz44mAM4Tr5tHEKRbtk0Eup9ylbC5U/exec";

// ========== STATE ==========
// ========== STAFFEL CONFIG ==========
const STAFFEL = [
  { min: 1,   max: 9,   pct: 25, label: "25% korting" },
  { min: 10,  max: 49,  pct: 40, label: "40% korting" },
  { min: 50,  max: 99,  pct: 45, label: "45% korting" },
  { min: 100, max: Infinity, pct: 50, label: "50% korting" }
];

// Hulpfunctie: incl. BTW → excl. BTW
function exclBTW(prijs) { return prijs / 1.21; }

function getStaffelTier(qty) {
  return STAFFEL.find(s => qty >= s.min && qty <= s.max) || STAFFEL[0];
}

function getStaffelPrice(tire, qty) {
  const tier = getStaffelTier(qty);
  // Basisprijs = kolom M (price2C = incl. BTW) omrekenen naar excl. BTW
  const basisExcl = exclBTW(tire.price2C);
  return Math.round(basisExcl * (1 - tier.pct / 100) * 100) / 100;
}

// Adviesprijs = kolom M excl. BTW (zonder staffelkorting)
function getAdviesPrijs(tire) {
  return exclBTW(tire.price2C);
}

// ========== B2C (PARTICULIER) PRIJSLOGICA ==========
// Vaste 25% korting, incl. BTW tonen, GEEN staffel
const B2C_DISCOUNT_PCT = 25;

// B2C prijs incl BTW = basisprijs excl × 0.75 × 1.21
function getB2CPrice(tire) {
  const basisExcl = exclBTW(tire.price2C);
  const netto = basisExcl * (1 - B2C_DISCOUNT_PCT / 100);
  const inclBTW = netto * 1.21;
  return Math.round(inclBTW * 100) / 100;
}
// Origineel (zonder korting) incl BTW = price2C
function getB2COriginalPrice(tire) {
  return Math.round(tire.price2C * 100) / 100;
}

// Universele prijshulpen: gebruikt door cart/factuur
function getUnitPrice(tire, qty) {
  return state.customerType === 'b2c' ? getB2CPrice(tire) : getStaffelPrice(tire, qty);
}
function getCartSubtotal() {
  const cartItems = Object.values(state.cart);
  const cartCount = getCartCount();
  return cartItems.reduce((sum, item) => sum + item.qty * getUnitPrice(item.tire, cartCount), 0);
}

// ========== LOCALSTORAGE: CUSTOMER TYPE ==========
const STORAGE_KEY_CT = 'tk_customerType';
function loadCustomerType() {
  try { return localStorage.getItem(STORAGE_KEY_CT); } catch(e) { return null; }
}
function saveCustomerType(ct) {
  try { localStorage.setItem(STORAGE_KEY_CT, ct); } catch(e) {}
}

let state = {
  view: "landing",  // 'landing' | 'shop' | 'admin'
  customerType: null,  // null (nog niet gekozen) | 'b2c' | 'b2b'
  tires: [],
  reservations: [],
  isAdmin: false,
  adminPin: "",
  search: "",
  filterSeason: "Alle",
  filterBrand: "Alle",
  sortBy: "brand",
  loading: true,
  submitting: false,
  notification: null,
  showCartModal: false,
  showPinModal: false,
  showAdminBtn: new URLSearchParams(window.location.search).has('admin'),
  showStaffel: false,
  showAllSoldOut: false,
  // Winkelmandje: { [tireId]: { tire, qty } }
  cart: {},
  // Qty selector per kaart (voordat je toevoegt)
  cardQty: {},
  // Bevestiging na reservering
  confirmationData: null,  // null | { id, customerType, name, items, totaalIncl, totaalExcl, levering, afleveradres, ... }
  reserveForm: { name: "", company: "", kvk: "", btw: "", email: "", phone: "", notes: "",
    straat: "", huisnummer: "", postcode: "", stad: "",
    levering: false, levStraat: "", levHuisnummer: "", levPostcode: "", levStad: "" }
};

function setState(updates) {
  Object.assign(state, updates);
  render();
}

// ========== API ==========

async function apiFetch(params) {
  const url = new URL(SCRIPT_URL);
  for (const [k, v] of Object.entries(params)) url.searchParams.set(k, v);
  const res = await fetch(url.toString());
  return res.json();
}

async function apiPost(body) {
  const res = await fetch(SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(body)
  });
  return res.json();
}

async function fetchInventory() {
  try {
    const data = await apiFetch({ action: "inventory" });
    if (data?.tires) {
      // Initialiseer cardQty voor nieuwe banden
      const newCardQty = { ...state.cardQty };
      for (const t of data.tires) {
        if (!newCardQty[t.id]) newCardQty[t.id] = 1;
      }
      setState({ tires: data.tires, loading: false, cardQty: newCardQty });
    } else {
      notify(data?.error || "Kan voorraad niet laden", "error");
      setState({ loading: false });
    }
  } catch (err) {
    notify("Kan voorraad niet laden: " + err.message, "error");
    setState({ loading: false });
  }
}

async function fetchReservations() {
  try {
    const data = await apiFetch({ action: "reservations", pin: state.adminPin });
    if (data?.reservations) setState({ reservations: data.reservations });
    else notify(data?.error || "Kan reserveringen niet laden", "error");
  } catch (err) { notify("Fout: " + err.message, "error"); }
}

async function submitReservation() {
  const f = state.reserveForm;
  const cartItems = Object.values(state.cart);
  const isB2C = state.customerType === 'b2c';

  // Validatie per klanttype
  if (!f.name || !f.email || !f.phone) { notify("Vul alle verplichte velden in", "error"); return; }
  if (isB2C && (!f.straat || !f.huisnummer || !f.postcode || !f.stad)) {
    notify("Vul uw volledige adresgegevens in", "error"); return;
  }
  if (!isB2C && (!f.company || !f.kvk)) {
    notify("Vul bedrijfsnaam en KvK-nummer in", "error"); return;
  }
  if (cartItems.length === 0) { notify("Mandje is leeg", "error"); return; }

  setState({ submitting: true });
  try {
    const cartCount = getCartCount();
    const items = cartItems.map(item => ({
      tireId: item.tire.id,
      brand: item.tire.brand,
      model: item.tire.model,
      size: item.tire.size,
      season: item.tire.season,
      qty: item.qty,
      priceB2B: item.tire.price2C,  // basis incl. BTW
      staffelPrijs: isB2C ? getB2CPrice(item.tire) : getStaffelPrice(item.tire, cartCount),
      prijsType: isB2C ? 'b2c_incl_btw' : 'b2b_excl_btw'
    }));

    // Klantadres voor particulier = primair adres; voor zakelijk leeg
    const klantAdres = isB2C ? `${f.straat} ${f.huisnummer}, ${f.postcode} ${f.stad}` : '';
    // Levering afleveradres
    const leveringAdres = f.levering ? `${f.levStraat} ${f.levHuisnummer}, ${f.levPostcode} ${f.levStad}` : '';

    const result = await apiPost({
      action: "reserveMulti",
      items,
      customerType: state.customerType,
      name: f.name,
      company: f.company,
      kvk: f.kvk,
      btw: f.btw,
      email: f.email,
      phone: f.phone,
      notes: f.notes,
      klantAdres,
      levering: f.levering ? "Ja" : "Nee",
      afleveradres: leveringAdres
    });

    if (result?.success) {
      // Bouw confirmation data voor de bevestigingsmodal
      const isB2C = state.customerType === 'b2c';
      const totaalIncl = items.reduce((s, i) => s + i.qty * (isB2C ? i.staffelPrijs : i.staffelPrijs * 1.21), 0) + (f.levering ? 150 : 0);
      const totaalExcl = items.reduce((s, i) => s + i.qty * (isB2C ? i.staffelPrijs / 1.21 : i.staffelPrijs), 0) + (f.levering ? (150/1.21) : 0);

      const confirmationData = {
        id: result.reservationId || 'TK-' + new Date().getFullYear() + '-??',
        customerType: state.customerType,
        name: f.name,
        company: f.company,
        kvk: f.kvk,
        btw: f.btw,
        email: f.email,
        phone: f.phone,
        klantAdres: isB2C ? `${f.straat} ${f.huisnummer}, ${f.postcode} ${f.stad}` : '',
        items,
        notes: f.notes,
        levering: f.levering ? 'Ja' : 'Nee',
        afleveradres: f.levering ? `${f.levStraat} ${f.levHuisnummer}, ${f.levPostcode} ${f.levStad}` : '',
        totaalIncl,
        totaalExcl
      };

      setState({
        showCartModal: false,
        cart: {},
        cardQty: {},
        submitting: false,
        confirmationData,
        reserveForm: { name: "", company: "", kvk: "", btw: "", email: "", phone: "", notes: "",
          straat: "", huisnummer: "", postcode: "", stad: "",
          levering: false, levStraat: "", levHuisnummer: "", levPostcode: "", levStad: "" }
      });
      fetchInventory();
    } else {
      notify(result?.error || "Er ging iets mis", "error");
      setState({ submitting: false });
    }
  } catch (err) {
    notify("Fout: " + err.message, "error");
    setState({ submitting: false });
  }
}

async function updateStatus(resId, status) {
  try {
    const result = await apiPost({ action: "updateStatus", reservationId: resId, status, pin: state.adminPin });
    if (result?.success) { notify(resId + " → " + statusLabel(status)); fetchReservations(); fetchInventory(); }
    else notify(result?.error || "Fout", "error");
  } catch (err) { notify("Fout: " + err.message, "error"); }
}

// ========== CART LOGIC ==========

function getCartQty(tireId) {
  return state.cart[tireId]?.qty || 0;
}

function getCardQty(tireId) {
  return state.cardQty[tireId] || 1;
}

function setCardQty(tireId, delta) {
  const tire = state.tires.find(t => t.id === tireId);
  if (!tire) return;
  const avail = tire.available ?? tire.stock;
  const inCart = getCartQty(tireId);
  const maxAdd = avail - inCart;
  const current = getCardQty(tireId);
  const next = Math.max(1, Math.min(maxAdd, current + delta));
  setState({ cardQty: { ...state.cardQty, [tireId]: next } });
}

function addToCart(tireId) {
  const tire = state.tires.find(t => t.id === tireId);
  if (!tire) return;
  const qty = getCardQty(tireId);
  const avail = tire.available ?? tire.stock;
  const alreadyInCart = getCartQty(tireId);
  if (alreadyInCart + qty > avail) { notify("Niet genoeg op voorraad", "error"); return; }

  const newCart = { ...state.cart };
  if (newCart[tireId]) {
    newCart[tireId] = { ...newCart[tireId], qty: newCart[tireId].qty + qty };
  } else {
    newCart[tireId] = { tire, qty };
  }
  // Reset card qty
  const newCardQty = { ...state.cardQty, [tireId]: 1 };
  setState({ cart: newCart, cardQty: newCardQty });
  notify(`${qty}× ${tire.brand} ${tire.size} toegevoegd aan mandje`);
}

function removeFromCart(tireId) {
  const newCart = { ...state.cart };
  delete newCart[tireId];
  setState({ cart: newCart });
}

function updateCartQty(tireId, delta) {
  const tire = state.tires.find(t => t.id === tireId);
  if (!tire) return;
  const avail = tire.available ?? tire.stock;
  const current = state.cart[tireId]?.qty || 0;
  const next = current + delta;
  if (next <= 0) { removeFromCart(tireId); return; }
  if (next > avail) { notify("Niet genoeg op voorraad", "error"); return; }
  setState({ cart: { ...state.cart, [tireId]: { ...state.cart[tireId], qty: next } } });
}

function getCartCount() {
  return Object.values(state.cart).reduce((s, i) => s + i.qty, 0);
}

function getCartTotal() {
  // Retailprijs (price2C) als referentie voor besparingberekening
  return Object.values(state.cart).reduce((s, i) => s + i.qty * i.tire.price2C, 0);
}

function getCartStaffelTotal() {
  const cartCount = getCartCount();
  return Object.values(state.cart).reduce((s, i) => s + i.qty * getStaffelPrice(i.tire, cartCount), 0);
}

// ========== HELPERS ==========

function notify(msg, type = "success") {
  setState({ notification: { msg, type } });
  setTimeout(() => setState({ notification: null }), 4000);
}

function seasonClass(s) {
  if (s === "Zomer") return "zomer";
  if (s === "Winter") return "winter";
  return "all-season";
}
function seasonIcon(s) {
  if (s === "Zomer") return "☀️";
  if (s === "Winter") return "❄️";
  return "🌤️";
}
function statusLabel(s) {
  return { pending: "Nieuw", confirmed: "Bevestigd", invoiced: "Gefactureerd", completed: "Opgehaald", cancelled: "Geannuleerd" }[s] || s;
}
function statusColor(s) {
  return { pending: "#F59E0B", confirmed: "#3B82F6", invoiced: "#8B5CF6", completed: "#10B981", cancelled: "#6B7280" }[s] || "#6B7280";
}
function statusNext(s) {
  return { pending: "confirmed", confirmed: "invoiced", invoiced: "completed" }[s] || null;
}
function statusNextLabel(s) {
  return { pending: "Bevestigen", confirmed: "Factureren", invoiced: "Opgehaald" }[s] || "";
}
function statusNextColor(s) {
  const n = statusNext(s);
  return n ? statusColor(n) : "";
}

function getFiltered() {
  let list = state.tires.filter(t => {
    if (state.filterSeason !== "Alle" && t.season !== state.filterSeason) return false;
    if (state.filterBrand !== "Alle" && t.brand !== state.filterBrand) return false;
    if (state.search) {
      const q = state.search.toLowerCase();
      return (t.brand + t.model + t.size + t.ref).toLowerCase().includes(q);
    }
    return true;
  });
  list.sort((a, b) => {
    // Uitverkocht altijd achteraan
    const aOut = (a.available ?? a.stock) <= 0;
    const bOut = (b.available ?? b.stock) <= 0;
    if (aOut !== bOut) return aOut ? 1 : -1;

    if (state.sortBy === "brand") return a.brand.localeCompare(b.brand) || a.model.localeCompare(b.model);
    if (state.sortBy === "price") return a.priceB2B - b.priceB2B;
    if (state.sortBy === "size") return a.size.localeCompare(b.size);
    return 0;
  });
  return list;
}

function getBrands() {
  return ["Alle", ...[...new Set(state.tires.map(t => t.brand))].sort()];
}

function esc(s) { const d = document.createElement("div"); d.textContent = String(s); return d.innerHTML; }

function dots(avail, total) {
  const max = Math.min(total, 8);
  let html = '<div class="dots">';
  for (let i = 0; i < max; i++) html += `<div class="dot ${i < avail ? 'on' : 'off'}"></div>`;
  if (total > 8) html += `<span style="font-size:10px;color:var(--text3);margin-left:2px">+${total-8}</span>`;
  html += '</div>';
  return html;
}

      html += `<div class="staffel-tip">💡 <span>Voeg nog <strong>${needed} band${needed !== 1 ? 'en' : ''}</strong> toe en bespaar <strong>${nextTier.pct}%</strong> op je hele bestelling</span></div>`;
    } else if (cartCount === 0 && STAFFEL[1]) {
      html += `<div class="staffel-tip">💡 <span>Bestel <strong>${STAFFEL[0].min}+ banden</strong> voor <strong>${STAFFEL[0].pct}%</strong> korting, of <strong>${STAFFEL[1].min}+</strong> voor <strong>${STAFFEL[1].pct}%</strong> staffelkorting — klik op de banner voor meer info</span></div>`;
    }
  }

  // === ONLANGS VERKOCHT SECTIE ===
  if (soldOut.length > 0) {
    const showAll = state.showAllSoldOut;
    const visible = showAll ? soldOut : soldOut.slice(0, 4);

    html += `
    <div class="sold-section">
      <div class="sold-section-header">
        <div class="sold-section-title">
          🔴 Onlangs verkocht
          <span class="sold-section-badge">${soldOut.length}</span>
        </div>
        ${soldOut.length > 4 ? `<button class="sold-toggle-btn" onclick="toggleSoldOut()">
          ${showAll ? `▲ Minder tonen` : `▼ Alle ${soldOut.length} tonen`}
        </button>` : ''}
      </div>
      <div class="sold-grid">`;

    for (const t of visible) {
      html += `
      <div class="tire-card sold-card">
        <div class="sold-banner">
          <span class="sold-banner-text">🔴 Onlangs verkocht</span>
          <span class="sold-banner-sub">Niet meer beschikbaar</span>
        </div>
        <div class="tire-top">
          <div>
            <div class="tire-brand">${esc(t.brand)}</div>
            <div class="tire-model">${esc(t.model)}</div>
          </div>
          <span class="season ${seasonClass(t.season)}">${seasonIcon(t.season)} ${esc(t.season)}</span>
        </div>
        <div class="tire-mid">
          <span class="tire-size">${esc(t.size)}</span>
          ${t.loadIndex ? `<span class="tire-load">${esc(t.loadIndex)}</span>` : ''}
        </div>
        <div class="tire-bottom">
          <div>
            <span style="font-size:18px;font-weight:800;color:var(--text3)">€${t.priceB2B.toFixed(2)}</span>
            <span class="tire-price-label">B2B</span>
            <div class="tire-advies">€${t.price2C.toFixed(2)} advies</div>
          </div>
          <div class="tire-stock">
            <div class="tire-avail no">Uitverkocht</div>
          </div>
        </div>
        ${t.dot ? `<div class="tire-meta">DOT ${esc(t.dot)} · Ref: ${esc(t.ref)}</div>` : ''}
      </div>`;
    }

    html += `</div></div>`;
  }

  // === BESCHIKBARE BANDEN ===
  html += `<div class="count">${state.loading ? 'Voorraad laden...' : available.length + ' banden beschikbaar'}</div>
  <div class="grid">`;

  for (const t of available) {
    const avail = t.available ?? t.stock;
    const inCart = getCartQty(t.id);
    const cardQty = getCardQty(t.id);
    const maxAdd = avail - inCart;
    const isInCart = inCart > 0;
    const staffelPrice = getStaffelPrice(t, cartCount);
    const showDiscount = currentTier.pct > 0;
    const isB2C = state.customerType === 'b2c';

    html += `
    <div class="tire-card ${isInCart ? 'in-cart' : ''}">
      <div class="tire-top">
        <div>
          <div class="tire-brand">${esc(t.brand)}</div>
          <div class="tire-model">${esc(t.model)}</div>
        </div>
        <span class="season ${seasonClass(t.season)}">${seasonIcon(t.season)} ${esc(t.season)}</span>
      </div>
      <div class="tire-mid">
        <span class="tire-size">${esc(t.size)}</span>
        ${t.loadIndex ? `<span class="tire-load">${esc(t.loadIndex)}</span>` : ''}
      </div>
      <div class="tire-bottom">
        <div>
          ${isB2C ? `
            <span class="price-b2c">€${getB2CPrice(t).toFixed(2)}</span><span class="price-b2c-from">incl. BTW</span>
            <span class="price-b2c-original">€${getB2COriginalPrice(t).toFixed(2)} van</span>
            <div class="price-b2c-label">-25% particulierkorting</div>
          ` : (showDiscount ? `
            <span class="tire-price-staffel">€${staffelPrice.toFixed(2)}</span><span class="tire-price-label" style="font-size:10px;color:var(--text3);margin-left:3px">excl. BTW</span>
            <span class="tire-price-original">€${getAdviesPrijs(t).toFixed(2)}</span>
            <div class="staffel-saving">-${currentTier.pct}% staffelkorting</div>
          ` : `
            <span class="tire-price">€${getStaffelPrice(t, 1).toFixed(2)}</span><span class="tire-price-label">excl. BTW</span>
            <div class="tire-advies">€${getAdviesPrijs(t).toFixed(2)} advies excl. BTW</div>
          `)}
        </div>
        <div class="tire-stock">
          ${dots(avail, t.stock)}
          <div class="tire-avail yes">${avail} beschikbaar</div>
        </div>
      </div>
      ${t.dot ? `<div class="tire-meta">DOT ${esc(t.dot)} · Ref: ${esc(t.ref)}</div>` : ''}
      <div class="card-footer">
        ${isInCart ? `<div class="in-cart-indicator">✓ ${inCart}× in mandje <button class="remove-from-cart" onclick="removeFromCart('${t.id}')" title="Verwijder uit mandje">✕</button></div>` : ''}
        ${maxAdd > 0 ? `
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="setCardQty('${t.id}', -1)" ${cardQty <= 1 ? 'disabled' : ''}>−</button>
          <span class="qty-val">${cardQty}</span>
          <button class="qty-btn" onclick="setCardQty('${t.id}', 1)" ${cardQty >= maxAdd ? 'disabled' : ''}>+</button>
        </div>
        <button class="add-btn" onclick="addToCart('${t.id}')">
          🛒 ${isInCart ? 'Meer' : 'In mandje'}
        </button>
        ` : (isInCart ? '' : '')}
      </div>
    </div>`;
  }

  html += '</div>';
  if (!state.loading && available.length === 0 && state.tires.length > 0) {
    html += '<div class="empty">Geen banden gevonden met deze filters</div>';
  }
  return html;
}

function renderCartModal() {
  const cartItems = Object.values(state.cart);
  const f = state.reserveForm;
  const cartCount = getCartCount();
  const currentTier = getStaffelTier(cartCount);
  const nextTier = STAFFEL.find(s => s.min > cartCount);

  let html = `
  <div class="modal-overlay" onclick="closeCart()">
    <div class="modal-box" onclick="event.stopPropagation()" style="max-width:520px">
      <div class="modal-header">
        <div class="modal-title">🛒 Reserveringsmandje</div>
        <button class="modal-close" onclick="closeCart()">✕</button>
      </div>`;

  if (cartItems.length === 0) {
    html += `
      <div class="cart-empty">
        <div class="cart-empty-icon">🛒</div>
        <div>Mandje is leeg</div>
        <div style="font-size:12px;color:var(--text4);margin-top:6px">Selecteer banden uit de catalogus</div>
      </div>
      <button class="btn-ghost" onclick="closeCart()" style="width:100%;margin-top:12px">Terug naar catalogus</button>`;
  } else {
    const isB2C = state.customerType === 'b2c';
    const cartTotal = getCartSubtotal();
    // Voor b2b: besparing tov adviesprijs. Voor b2c: besparing = 25% van prijs2C (incl BTW)
    const regularTotal = isB2C
      ? cartItems.reduce((s, it) => s + it.qty * getB2COriginalPrice(it.tire), 0)
      : cartItems.reduce((s, it) => s + it.qty * getAdviesPrijs(it.tire), 0);
    const savings = regularTotal - cartTotal;
    const summaryTitle = isB2C
      ? `Geselecteerde banden · <span style="color:var(--green)">-25% particulierkorting (incl. BTW)</span>`
      : `Geselecteerde banden${currentTier.pct > 0 ? ` · <span style="color:var(--green)">-${currentTier.pct}% staffelkorting actief</span>` : ''}`;

    html += `
      <div class="cart-summary">
        <div class="cart-summary-title">${summaryTitle}</div>`;

    for (const item of cartItems) {
      const t = item.tire;
      const avail = t.available ?? t.stock;
      const unitPrice = getUnitPrice(t, cartCount);
      html += `
        <div class="cart-summary-item">
          <div class="cart-item-info">
            <div class="cart-item-name">${esc(t.brand)} ${esc(t.model)}</div>
            <div class="cart-item-size">${esc(t.size)} · ${seasonIcon(t.season)} ${esc(t.season)}</div>
          </div>
          <div class="cart-item-qty">
            <button class="cart-qty-btn" onclick="updateCartQty('${t.id}', -1)">−</button>
            <span style="font-size:14px;font-weight:700;min-width:20px;text-align:center">${item.qty}</span>
            <button class="cart-qty-btn" onclick="updateCartQty('${t.id}', 1)" ${item.qty >= avail ? 'disabled style="opacity:.3"' : ''}>+</button>
          </div>
          <div class="cart-item-price">€${(item.qty * unitPrice).toFixed(2)}</div>
          <button class="cart-remove" onclick="removeFromCart('${t.id}')" title="Verwijderen">✕</button>
        </div>`;
    }

    // Promo-blok: b2c = vaste korting-melding, b2b = staffel-progress
    let promoBlock = '';
    if (isB2C) {
      promoBlock = `
        <div style="
          margin: 8px 0;
          background: var(--green);
          border-radius: 10px;
          padding: 14px 16px;
          display:flex; align-items:center; gap:12px;
        ">
          <div style="font-size:28px">🎉</div>
          <div>
            <div style="font-size:15px;font-weight:900;color:#000">25% korting al verrekend</div>
            <div style="font-size:12px;color:rgba(0,0,0,.7);margin-top:2px">Alle prijzen tonen inclusief 21% BTW</div>
          </div>
        </div>`;
    } else if (nextTier) {
      promoBlock = `
        <div style="
          margin: 8px 0;
          background: #10B981;
          border-radius: 10px;
          padding: 14px 16px;
          display: flex;
          align-items: center;
          gap: 12px;
        ">
          <div style="font-size:32px;line-height:1">🎯</div>
          <div style="flex:1">
            <div style="font-size:16px;font-weight:900;color:#000;line-height:1.2">
              Nog <span style="font-size:22px">${nextTier.min - cartCount}</span> band${nextTier.min - cartCount !== 1 ? 'en' : ''} → <span style="font-size:22px">-${nextTier.pct}%</span> korting!
            </div>
            <div style="font-size:12px;color:rgba(0,0,0,.7);margin-top:3px">
              op je <strong>hele</strong> bestelling — voeg toe uit de catalogus
            </div>
          </div>
        </div>`;
    } else if (currentTier.pct > 0) {
      promoBlock = `
        <div style="
          margin: 8px 0;
          background: var(--amber);
          border-radius: 10px;
          padding: 14px 16px;
          display:flex; align-items:center; gap:12px;
        ">
          <div style="font-size:28px">🏆</div>
          <div>
            <div style="font-size:16px;font-weight:900;color:#000">Maximale korting: -${currentTier.pct}% actief!</div>
            <div style="font-size:12px;color:rgba(0,0,0,.7);margin-top:2px">Je hebt de hoogste staffelkorting bereikt</div>
          </div>
        </div>`;
    }

    const totalLabel = isB2C ? 'Totaal incl. BTW' : `Totaal${currentTier.pct > 0 ? ` (-${currentTier.pct}%)` : ''}`;

    html += `
        ${promoBlock}
        <div class="cart-total">
          <div>
            <div class="cart-total-label">${totalLabel}</div>
            ${savings > 0 ? `<div style="font-size:11px;color:var(--green)">Besparing: €${savings.toFixed(2)}</div>` : ''}
          </div>
          <div style="text-align:right">
            ${savings > 0 ? `<div style="font-size:12px;color:var(--text4);text-decoration:line-through">€${regularTotal.toFixed(2)}</div>` : ''}
            <div class="cart-total-val">€${cartTotal.toFixed(2)}</div>
          </div>
        </div>
      </div>

      ${renderReserveForm(isB2C, f, cartCount)}`;
  }

  html += `</div></div>`;
  return html;
}

function renderReserveForm(isB2C, f, cartCount) {
  const b2cFields = `

    <input id="resEmail" placeholder="E-mail *" type="email" value="${esc(f.email)}" />

      <input id="resStraat" placeholder="Straatnaam *" value="${esc(f.straat)}" />
      <input id="resHuisnummer" placeholder="Nr. *" value="${esc(f.huisnummer)}" />
    </div>
    <div style="display:grid;grid-template-columns:120px 1fr;gap:8px;margin-bottom:8px">
      <input id="resPostcode" placeholder="Postcode *" value="${esc(f.postcode)}" />
      <input id="resStad" placeholder="Plaats *" value="${esc(f.stad)}" />

    <textarea id="resNotes" placeholder="Opmerkingen (optioneel)">${esc(f.notes)}</textarea>

  const b2bFields = `
    <div class="form-section-title">Bedrijfsgegevens</div>
    <input id="resCompany" placeholder="Bedrijfsnaam *" value="${esc(f.company)}" />
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <input id="resKvK" placeholder="KvK-nummer *" value="${esc(f.kvk)}" />
      <input id="resBTW" placeholder="BTW-nummer (optioneel)" value="${esc(f.btw)}" />
    </div>
    <div class="form-section-title" style="margin-top:10px">Contactpersoon</div>
    <input id="resName" placeholder="Naam contactpersoon *" value="${esc(f.name)}" />
    <input id="resEmail" placeholder="E-mail *" type="email" value="${esc(f.email)}" />
    <input id="resPhone" type="tel" placeholder="Telefoon *" value="${esc(f.phone)}" />
    <textarea id="resNotes" placeholder="Opmerkingen (optioneel)">${esc(f.notes)}</textarea>

  // Levering-sectie (hetzelfde voor beide, maar b2c heeft al een afleveradres)
  const leveringBlok = `
    <div style="background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:14px 16px;margin-bottom:8px">
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px;font-weight:600;color:var(--text)">
        <input type="checkbox" id="resLevering" ${f.levering ? 'checked' : ''} onchange="toggleLeveringFields()" style="width:18px;height:18px;accent-color:var(--amber);background:var(--border);border-radius:4px;cursor:pointer" />
        <span>🚚 Levering/verzending gewenst${isB2C ? ' (ander adres dan hierboven)' : ''}</span>
        <span style="margin-left:auto;font-size:13px;color:var(--amber);font-weight:700">+ €150,– incl. BTW</span>
      </label>
      <div id="leveringFields" style="display:${f.levering ? 'block' : 'none'};margin-top:12px">
        <div style="font-size:11px;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Afleveradres</div>
        <div style="display:grid;grid-template-columns:1fr 80px;gap:8px;margin-bottom:8px">

          <input id="resLevHuisnummer" placeholder="Nr." value="${esc(f.levHuisnummer)}" style="width:100%" />
        </div>
        <div style="display:grid;grid-template-columns:120px 1fr;gap:8px">
          <input id="resLevPostcode" placeholder="Postcode" value="${esc(f.levPostcode)}" style="width:100%" />

  `;

  return `
    <div class="modal-form">

        ${state.submitting ? '<span class="spinner"></span> Bezig...' : `Reservering plaatsen (${cartCount} band${cartCount !== 1 ? 'en' : ''})`}

// ========== CONFIRMATION MODAL ==========
function getFirstName(fullName) {
  if (!fullName) return '';
  const trimmed = fullName.trim();
  const space = trimmed.indexOf(' ');
  return space > 0 ? trimmed.substring(0, space) : trimmed;
}

function renderConfirmationModal() {
  const c = state.confirmationData;
  if (!c) return '';
  const isB2C = c.customerType === 'b2c';
  const firstName = getFirstName(c.name);

  // Timeline per klanttype
  const b2cSteps = [
    { done: true,  head: 'Reservering geplaatst',   desc: `Uw aanvraag met nummer ${c.id} is bij ons binnen.` },
    { active: true, head: 'Bevestigingsmail',        desc: 'Binnen 30 minuten ontvangt u een e-mail ter bevestiging.' },
    { head: 'Factuur met betaallink',                 desc: 'Aansluitend sturen wij de factuur — betalen kan eenvoudig via bankoverschrijving.' },
    { head: c.levering === 'Ja' ? 'Verzending' : 'Ophalen op afspraak',
      desc: c.levering === 'Ja'
        ? `Na betaling sturen wij uw banden naar ${c.afleveradres || 'het doorgegeven adres'}.`
        : 'Zodra de betaling binnen is, nemen wij contact op om een afhaalmoment af te spreken.' }
  ];
  const b2bSteps = [
    { done: true,  head: 'Reservering bevestigd',    desc: `${c.id}` },
    { active: true, head: 'Factuur per e-mail',      desc: 'Binnen 1 werkdag ontvangt u de factuur.' },
    { head: 'Betaling',                              desc: 'Betalingstermijn 14 dagen netto.' },
    { head: c.levering === 'Ja' ? 'Levering' : 'Afhalen', desc: c.levering === 'Ja' ? 'Conform afspraak op opgegeven adres.' : 'Afhalen volgens afspraak te Tilburg.' }
  ];
  const steps = isB2C ? b2cSteps : b2bSteps;

  // Titel en subtitel per type
  const title = isB2C
    ? `Bedankt${firstName ? ', ' + esc(firstName) : ''}!`
    : 'Reservering bevestigd';
  const subtitle = isB2C
    ? 'Uw reservering staat vast. Hieronder ziet u wat er nu gaat gebeuren.'
    : `${esc(c.company || c.name)} — uw aanvraag is geregistreerd.`;

  // Totaal-label per type
  const totalLabel = isB2C ? 'Totaal te betalen (incl. BTW)' : 'Totaal incl. BTW';
  const totalSub = isB2C ? 'BTW en 25% korting al verrekend' : 'Subtotaal excl. BTW: €' + c.totaalExcl.toFixed(2);

  // Items lijst
  const itemsHtml = (c.items || []).map(i => `
    <div class="conf-item-row">
      <div>
        <div class="conf-item-name">${i.qty}× ${esc(i.brand)} ${esc(i.model)}</div>
        <div class="conf-item-size">${esc(i.size)} · ${esc(i.season || '')}</div>
      </div>
      <div style="text-align:right;font-weight:600;color:var(--text)">
        €${(i.qty * (isB2C ? i.staffelPrijs : i.staffelPrijs * 1.21)).toFixed(2)}
      </div>
    </div>
  `).join('');

  return `
  <div class="conf-modal-overlay" onclick="closeConfirmation()">
    <div class="conf-box" onclick="event.stopPropagation()">
      <button class="conf-close" onclick="closeConfirmation()" title="Sluiten">✕</button>

      <div class="conf-check-wrap">
        <div class="conf-check-glow ${isB2C ? 'b2c' : 'b2b'}"></div>
        <svg class="conf-check-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle class="conf-check-circle ${isB2C ? 'b2c' : 'b2b'}" cx="50" cy="50" r="38"/>
          <polyline class="conf-check-mark ${isB2C ? 'b2c' : 'b2b'}" points="30,52 45,66 72,38"/>
        </svg>
      </div>

      <div class="conf-title">${title}</div>
      <div class="conf-sub">${subtitle}</div>

      <div class="conf-resnum">
        <div>
          <div class="conf-resnum-label">Reserveringsnummer</div>
          <div class="conf-resnum-val">${esc(c.id)}</div>
        </div>
        <button id="confCopyBtn" class="conf-copy-btn" onclick="copyReservationId()">📋 Kopieer</button>
      </div>

      <div class="conf-items">${itemsHtml}</div>

      <div class="conf-total ${isB2C ? 'b2c' : ''}">
        <div>
          <div class="conf-total-label">${totalLabel}</div>
          <div class="conf-total-sub">${totalSub}</div>
        </div>
        <div class="conf-total-val">€${c.totaalIncl.toFixed(2)}</div>
      </div>

      <div class="conf-timeline">
        <div class="conf-timeline-title">Wat gebeurt er nu?</div>
        <div class="conf-timeline-steps">
          ${steps.map((s, idx) => `
            <div class="conf-step">
              <div class="conf-step-num ${s.done ? 'done' : (s.active ? 'active ' + (isB2C ? 'b2c-active' : '') : '')}">
                ${s.done ? '✓' : (idx + 1)}
              </div>
              <div class="conf-step-text">
                <div class="conf-step-head">${s.head}</div>
                <div class="conf-step-desc">${s.desc}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="conf-actions">
        <button class="conf-btn-primary" onclick="downloadConfirmationPDF()">
          📄 Bevestiging als PDF
        </button>
        <button class="conf-btn-secondary" onclick="closeConfirmation()">
          ${isB2C ? 'Terug naar catalogus' : 'Nieuwe reservering'}
        </button>
      </div>

      ${isB2C ? `
      <div class="conf-contact">
        Vragen? Bel Thomas op <a href="tel:+31643481608">+31 6 43481608</a> of mail <a href="mailto:thomas@tkhandelsonderneming.nl">thomas@tkhandelsonderneming.nl</a>
      </div>` : `
      <div class="conf-contact">
        Contact: <a href="mailto:thomas@tkhandelsonderneming.nl">thomas@tkhandelsonderneming.nl</a> · <a href="tel:+31643481608">+31 6 43481608</a>
      </div>`}
    </div>
  </div>`;
}

function closeConfirmation() {
  setState({ confirmationData: null });
}

function copyReservationId() {
  const c = state.confirmationData;
  if (!c) return;
  const btn = document.getElementById('confCopyBtn');
  const doneFeedback = () => {
    if (btn) {
      btn.classList.add('copied');
      btn.innerHTML = '✓ Gekopieerd';
      setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = '📋 Kopieer'; }, 2000);
    }
  };
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(c.id).then(doneFeedback).catch(() => {
      notify('Kopiëren mislukt — noteer het nummer handmatig', 'error');
    });
  } else {
    // Fallback voor oudere browsers / http
    const ta = document.createElement('textarea');
    ta.value = c.id;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); doneFeedback(); }
    catch(e) { notify('Kopiëren niet ondersteund', 'error'); }
    document.body.removeChild(ta);
  }
}

async function downloadConfirmationPDF() {
  const c = state.confirmationData;
  if (!c) return;
  // Hergebruik PDF-generator via fake-reservation object
  const fakeReservation = {
    id: c.id,
    status: 'pending',
    customerType: c.customerType,
    name: c.name,
    company: c.company,
    kvk: c.kvk,
    btw: c.btw,
    email: c.email,
    phone: c.phone,
    klantAdres: c.klantAdres,
    itemsJson: JSON.stringify(c.items),
    qty: (c.items || []).reduce((s, i) => s + i.qty, 0),
    notes: c.notes,
    levering: c.levering,
    afleveradres: c.afleveradres,
    createdAt: new Date().toISOString()
  };
  try {
    await generatePDFfromReservation(fakeReservation);
  } catch(err) {
    notify("Fout bij PDF: " + err.message, "error");
  }
}

function renderAdmin() {
  const res = [...state.reservations].sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || ""));
  const counts = { total: res.length, pending: 0, confirmed: 0, invoiced: 0, completed: 0 };
  res.forEach(r => { if (counts[r.status] !== undefined) counts[r.status]++; });

  let html = `
  <div class="admin-top">
    <div class="admin-title">Reserveringen beheren</div>
    <div class="admin-btns">
      <button class="btn-ghost" onclick="fetchReservations()">Vernieuwen</button>
      <button class="btn-ghost" onclick="adminLogout()">Uitloggen</button>
    </div>
  </div>
  <div class="stats">
    ${[{l:'Totaal',v:counts.total,c:'var(--text3)'},{l:'Nieuw',v:counts.pending,c:'var(--amber)'},{l:'Bevestigd',v:counts.confirmed,c:'var(--blue)'},{l:'Gefactureerd',v:counts.invoiced,c:'var(--purple)'},{l:'Opgehaald',v:counts.completed,c:'var(--green)'}]
      .map(s => `<div class="stat"><div class="stat-val" style="color:${s.c}">${s.v}</div><div class="stat-label">${s.l}</div></div>`).join('')}

    html += '<div class="res-list">';
    for (const r of res) {
      const sc = statusColor(r.status);
      const next = statusNext(r.status);
      // Parse items als JSON indien aanwezig
      let itemsHtml = '';
      if (r.itemsJson) {
        try {
          const items = JSON.parse(r.itemsJson);
          itemsHtml = '<div class="res-items">' +
            items.map(i => `<div class="res-item-row">${esc(i.brand)} ${esc(i.model)} · ${esc(i.size)} · ${i.qty}× · €${exclBTW(i.priceB2B || 0).toFixed(2)} excl. BTW</div>`).join('') +
            '</div>';
        } catch(e) {
          itemsHtml = `<div class="res-tire">${esc(r.tireBrand || '')} ${esc(r.tireModel || '')} · ${esc(r.tireSize || '')} · ${r.qty || 1}×</div>`;
        }
      } else {
        itemsHtml = `<div class="res-tire">${esc(r.tireBrand || '')} ${esc(r.tireModel || '')} · ${esc(r.tireSize || '')} · ${r.qty || 1}×</div>`;
      }

      html += `
      <div class="res-card">
        <div class="res-top">
          <div>
            <span class="res-name">${esc(r.name)}</span>
            ${r.company ? `<span class="res-company">${esc(r.company)}</span>` : ''}
            ${r.customerType === 'b2c' ? `<span class="status-badge ct-badge-b2c" style="margin-left:6px">👤 Particulier</span>` : (r.customerType === 'b2b' ? `<span class="status-badge ct-badge-b2b" style="margin-left:6px">🏢 Zakelijk</span>` : '')}
          </div>
          <span class="status-badge" style="background:${sc}22;color:${sc}">${statusLabel(r.status)}</span>
        </div>
        ${itemsHtml}
        <div class="res-contact">${esc(r.email)} · ${esc(r.phone)}${r.kvk ? ` · KvK ${esc(r.kvk)}` : ''}${r.notes ? ` · "${esc(r.notes)}"` : ''}${r.levering === 'Ja' ? `<span style="margin-left:8px;background:rgba(59,130,246,.15);color:var(--blue);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700">🚚 Levering${r.afleveradres ? ': ' + esc(r.afleveradres) : ''}</span>` : ''}</div>
        <div class="res-meta">${esc(r.id)} · ${r.createdAt ? new Date(r.createdAt).toLocaleString('nl-NL') : ''}</div>
        ${r.status !== 'cancelled' && r.status !== 'completed' ? `
        <div class="res-actions">
          ${next ? `<button class="btn-primary" style="font-size:12px;padding:6px 14px;background:${statusNextColor(r.status)}" onclick="updateStatus('${r.id}','${next}')">${statusNextLabel(r.status)}</button>` : ''}

        </div>` : ''}
      </div>`;
    }
    html += '</div>';
  }
  return html;
}

function bindEvents() {

  const seasonFilter = el("seasonFilter");

  const brandFilter = el("brandFilter");
  if (brandFilter) brandFilter.onchange = (e) => setState({ filterBrand: e.target.value });

  const sortSelect = el("sortSelect");
  if (sortSelect) sortSelect.onchange = (e) => setState({ sortBy: e.target.value });

}

function buildFactuurHTML(r) {
  let items = [];
  try { items = JSON.parse(r.itemsJson || "[]"); } catch(e) {
    items = [{ brand: r.tireBrand, model: r.tireModel, size: r.tireSize, qty: r.qty || 1, priceB2B: 0, staffelPrijs: 0 }];
  }

  const BTW_PCT = 0.21;
  const isB2C = r.customerType === 'b2c';  // fallback: b2b voor oude reserveringen zonder type
  const datum = new Date().toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' });

  // Levering: altijd €150 incl BTW totaal
  const leveringIncl = r.levering === 'Ja' ? 150.00 : 0;
  const leveringExcl = leveringIncl / (1 + BTW_PCT);
  const leveringBTW  = leveringIncl - leveringExcl;

  // BTW berekening per regel — gebruik staffelPrijs (=werkelijk betaalde prijs)
  // B2C: staffelPrijs is incl BTW → excl = /1.21
  // B2B: staffelPrijs is excl BTW → incl = *1.21
  const itemsRows = items.map(i => {
    const werkprijs = i.staffelPrijs || (i.priceB2B || 0);  // fallback
    const prijsExcl = isB2C ? (werkprijs / (1 + BTW_PCT)) : werkprijs;
    const prijsIncl = isB2C ? werkprijs : (werkprijs * (1 + BTW_PCT));
    const totaalExcl = i.qty * prijsExcl;
    const totaalIncl = i.qty * prijsIncl;

    if (isB2C) {
      // Particulier: incl BTW prominent
      return `
      <tr>
        <td style="padding:10px 14px;border-bottom:1px solid #e5e7eb;font-family:'Segoe UI',Arial,sans-serif">${i.brand} ${i.model}<br><span style="font-size:12px;color:#6b7280">${i.size} · ${seasonIcon(i.season || '')}</span></td>

      </tr>`;
    } else {
      // Zakelijk: excl BTW prominent (huidige layout)
      return `
      <tr>
        <td style="padding:10px 14px;border-bottom:1px solid #e5e7eb;font-family:'Segoe UI',Arial,sans-serif">${i.brand} ${i.model}<br><span style="font-size:12px;color:#6b7280">${i.size} · ${seasonIcon(i.season || '')}</span></td>

  // Totalen

    return s + i.qty * (isB2C ? werkprijs / (1 + BTW_PCT) : werkprijs);

async function copyFactuurRichText(resId) {
  const r = state.reservations.find(x => x.id === resId);
  if (!r) return;
  const htmlStr = buildFactuurHTML(r);

  try {
    // Moderne clipboard API met rich text
    const blob = new Blob([htmlStr], { type: 'text/html' });
    const clipItem = new ClipboardItem({ 'text/html': blob });
    await navigator.clipboard.write([clipItem]);
    notify('✅ Factuur gekopieerd als opgemaakte tekst — plak in je mailprogramma');
  } catch(e) {
    // Fallback: open in nieuw venster
    const w = window.open('', '_blank');
    w.document.write(htmlStr);
    w.document.close();
    notify('📋 Factuur geopend in nieuw venster — selecteer alles (Ctrl+A) en kopieer', 'success');
  }
}

function openFactuurWindow(resId) {
  const r = state.reservations.find(x => x.id === resId);

  const htmlStr = buildFactuurHTML(r);

async function downloadFactuurPDF(resId) {
  const r = state.reservations.find(x => x.id === resId);
  if (!r) return;
  return generatePDFfromReservation(r);
}

async function generatePDFfromReservation(r) {
  notify("⏳ PDF wordt gegenereerd...", "success");

  const htmlStr = buildFactuurHTML(r);

  // Render in verborgen iframe op vaste breedte
  const iframe = document.createElement('iframe');
  iframe.style.cssText = 'position:fixed;left:-9999px;top:0;width:794px;height:auto;border:none;visibility:hidden;';
  document.body.appendChild(iframe);
  iframe.contentDocument.open();
  // Voeg page-break CSS toe aan de factuur
  const htmlWithBreaks = htmlStr.replace('</head>', `<style>
    .pdf-section { page-break-inside: avoid; break-inside: avoid; }
    table { border-collapse: collapse; }
  </style></head>`);
  iframe.contentDocument.write(htmlWithBreaks);
  iframe.contentDocument.close();

  // Wacht tot content geladen is
  await new Promise(resolve => {
    if (iframe.contentDocument.readyState === 'complete') resolve();
    else iframe.onload = resolve;
  });
  await new Promise(resolve => setTimeout(resolve, 600));

  try {
    const { jsPDF } = window.jspdf;
    const doc = iframe.contentDocument;
    const body = doc.body;

    // A4 dimensies in pixels bij 96dpi: 794 x 1123
    const A4_W_PX = 794;
    const A4_H_PX = 1050; // iets minder dan vol voor marges
    const SCALE = 2;

    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const pdfW = pdf.internal.pageSize.getWidth();   // 210mm
    const pdfH = pdf.internal.pageSize.getHeight();  // 297mm

    // Haal alle top-level secties op uit de factuur tabel
    // We renderen de volledige body maar snijden slim
    const totalH = body.scrollHeight;
    const totalPages = Math.ceil(totalH / A4_H_PX);

    for (let page = 0; page < totalPages; page++) {
      if (page > 0) pdf.addPage();

      const yStart = page * A4_H_PX;
      const yEnd = Math.min(yStart + A4_H_PX, totalH);

      // Zoek veilig afbreekpunt: geen blok halverwege
      // Scan DOM elementen voor veilige snijpunten
      let safeY = yEnd;
      if (page < totalPages - 1) {
        const allElems = Array.from(doc.querySelectorAll('tr, td > div, td > table'));
        for (const el of allElems) {
          const rect = el.getBoundingClientRect();
          const elTop = rect.top + doc.documentElement.scrollTop;
          const elBot = elTop + rect.height;
          // Als dit element over de paginagrens loopt, snij ervoor
          if (elTop < yEnd && elBot > yEnd && rect.height < A4_H_PX * 0.4) {
            safeY = elTop;
            break;
          }
        }
      }

      const clipH = (page === totalPages - 1) ? (totalH - yStart) : (safeY - yStart);

      const canvas = await html2canvas(body, {
        scale: SCALE,
        useCORS: true,
        allowTaint: true,
        backgroundColor: '#f3f4f6',
        width: A4_W_PX,
        windowWidth: A4_W_PX,
        y: yStart,
        height: clipH,
        scrollY: -yStart
      });

      const imgData = canvas.toDataURL('image/jpeg', 0.92);
      const imgH = (clipH * pdfW) / A4_W_PX;
      pdf.addImage(imgData, 'JPEG', 0, 0, pdfW, imgH);
    }

    const datum = new Date().toISOString().slice(0, 10);
    pdf.save('Factuur_' + r.id + '_' + datum + '.pdf');
    notify("✅ PDF opgeslagen!");
  } catch(err) {
    notify("Fout bij PDF: " + err.message, "error");
    console.error(err);
  } finally {
    document.body.removeChild(iframe);
  }
}

function chooseCustomerType(ct) {

function switchCustomerType(ct) {
  if (state.customerType === ct) return;
  const cartCount = getCartCount();
  if (cartCount > 0) {
    const msg = ct === 'b2c'
      ? `U wisselt naar de Particulier-weergave.\n\nDe prijzen in uw mandje (${cartCount} band${cartCount !== 1 ? 'en' : ''}) veranderen: nu incl. BTW met 25% korting in plaats van de zakelijke staffelprijs.\n\nMandje leegmaken en opnieuw beginnen?`
      : `U wisselt naar de Zakelijk-weergave.\n\nDe prijzen in uw mandje (${cartCount} band${cartCount !== 1 ? 'en' : ''}) veranderen: nu excl. BTW met staffelkorting in plaats van de particuliere prijs.\n\nMandje leegmaken en opnieuw beginnen?`;
    if (confirm(msg)) {
      saveCustomerType(ct);
      setState({ customerType: ct, cart: {}, cardQty: {} });
    } else {
      // Gebruiker wil mandje houden — alleen type wisselen, prijzen her-renderen
      saveCustomerType(ct);
      setState({ customerType: ct });
    }
  } else {
    saveCustomerType(ct);
    setState({ customerType: ct });
  }
}

function doReserve() {
  const isB2C = state.customerType === 'b2c';
  const levering = document.getElementById("resLevering")?.checked || false;
  const f = {
    name: document.getElementById("resName")?.value || "",
    company: isB2C ? "" : (document.getElementById("resCompany")?.value || ""),
    kvk: isB2C ? "" : (document.getElementById("resKvK")?.value || ""),
    btw: isB2C ? "" : (document.getElementById("resBTW")?.value || ""),
    email: document.getElementById("resEmail")?.value || "",
    phone: document.getElementById("resPhone")?.value || "",
    notes: document.getElementById("resNotes")?.value || "",
    // Particulier-adres (primair adres)
    straat: isB2C ? (document.getElementById("resStraat")?.value || "") : "",
    huisnummer: isB2C ? (document.getElementById("resHuisnummer")?.value || "") : "",
    postcode: isB2C ? (document.getElementById("resPostcode")?.value || "") : "",
    stad: isB2C ? (document.getElementById("resStad")?.value || "") : "",
    // Levering-adres (afwijkend)
    levering,
    levStraat: levering ? (document.getElementById("resLevStraat")?.value || "") : "",
    levHuisnummer: levering ? (document.getElementById("resLevHuisnummer")?.value || "") : "",
    levPostcode: levering ? (document.getElementById("resLevPostcode")?.value || "") : "",
    levStad: levering ? (document.getElementById("resLevStad")?.value || "") : ""
  };
  if (levering && (!f.levStraat || !f.levPostcode || !f.levStad)) {
    notify("Vul het volledige afleveradres in", "error"); return;
  }
  state.reserveForm = f;
  submitReservation();
}
